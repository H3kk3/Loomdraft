name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      # Fail fast if the pushed tag doesn't match what every version-tracking
      # file claims. Without this, a tag like v0.3.0 created on a commit that
      # still says version 0.2.0 produces artifacts named Loomdraft_0.2.0_*
      # (since Tauri reads the executable version from tauri.conf.json at build
      # time, not from the tag). Runs on every matrix platform — cheap, fast,
      # and Git Bash is available on the Windows runner via `shell: bash`.
      - name: Verify tag matches version files
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $TAG_VERSION"

          fail() { echo "::error::$1"; exit 1; }

          CONF=$(grep -E '^\s*"version"' src-tauri/tauri.conf.json | head -1 | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')
          [ "$CONF" = "$TAG_VERSION" ] || fail "src-tauri/tauri.conf.json has '$CONF', tag is 'v$TAG_VERSION'"

          CARGO=$(grep -E '^version[[:space:]]*=' src-tauri/Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          [ "$CARGO" = "$TAG_VERSION" ] || fail "src-tauri/Cargo.toml has '$CARGO', tag is 'v$TAG_VERSION'"

          PKG=$(grep -E '^\s*"version"' package.json | head -1 | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')
          [ "$PKG" = "$TAG_VERSION" ] || fail "package.json has '$PKG', tag is 'v$TAG_VERSION'"

          if [ -f docs/hugo.toml ]; then
            HUGO=$(grep -E '^[[:space:]]*version[[:space:]]*=' docs/hugo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
            [ "$HUGO" = "$TAG_VERSION" ] || fail "docs/hugo.toml has '$HUGO', tag is 'v$TAG_VERSION'"
          fi

          echo "All version files match tag v$TAG_VERSION"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Loomdraft ${{ github.ref_name }}'
          releaseBody: |
            Download Loomdraft for your platform below.

            **macOS users:** If you see "app is damaged and can't be opened", open Terminal and run:
            ```
            xattr -r -d com.apple.quarantine /Applications/Loomdraft.app
            ```
            This is needed because the app is not yet code-signed with an Apple Developer certificate.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
